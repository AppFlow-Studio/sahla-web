
[functions.sync-prayer-times]
enabled = true
verify_jwt = true
import_map = "./functions/sync-prayer-times/deno.json"
entrypoint = "./functions/sync-prayer-times/index.ts"

[functions.stripe-webhooks]
enabled = true
verify_jwt = false
import_map = "./functions/stripe-webhooks/deno.json"
entrypoint = "./functions/stripe-webhooks/index.ts"

[functions.send-push]
enabled = true
# Drained by the per-minute cron via net.http_post (no Authorization header).
# Safe to leave unauthenticated: it only delivers rows the auth-gated enqueue
# route already wrote — it never accepts a push payload over the wire.
verify_jwt = false
import_map = "./functions/send-push/deno.json"
entrypoint = "./functions/send-push/index.ts"

[functions.clerk-webhooks]
enabled = true
# Clerk uses Svix HMAC signatures, not Supabase JWTs. Keep this off or
# every Clerk webhook call gets rejected at the auth layer.
verify_jwt = false
import_map = "./functions/clerk-webhooks/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/clerk-webhooks/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/clerk-webhooks/*.html" ]
